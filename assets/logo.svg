<svg width="400" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Define styles -->
  <style>
    .gocheckin-text {
      font-family: "Phosphate", Impact, sans-serif;
      font-weight: normal;
      font-size: 60px;
      fill: #4CAF50; /* Outer fill color */
      stroke: #FFFFFF; /* White stroke to simulate inline cutout */
      stroke-width: 10px;
      stroke-linejoin: round;
      paint-order: stroke fill;
    }
  </style>

  <!-- Text element -->
  <text x="10" y="120" class="gocheckin-text">☑️ GOCHECKIN</text>
</svg>